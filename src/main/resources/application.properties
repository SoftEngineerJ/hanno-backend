spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/hannodb
spring.datasource.username=postgres
spring.datasource.password=Postgregut7/

# Reduce connection pool for Supabase free tier
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

server.port=${PORT:8080}

server.address=0.0.0.0

# Brevo SMTP (in Render als Environment Variables setzen)
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:true}

# Brevo API Key (for transactional emails)
brevo.api.key=${BREVO_API_KEY:}

# Firebase credentials JSON for push notifications (set as environment variable in Render)
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}
